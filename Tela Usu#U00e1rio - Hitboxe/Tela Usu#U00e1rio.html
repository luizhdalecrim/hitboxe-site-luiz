<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Usuário - Hit-boxe</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">
        <img id="menu" src="botão opções.png" alt="Botão de Menu">

        <div id="caixa1">    
            <button type="button" id="faq">FAQ</button>
        </div>

        <div id="caixa2">
            <button type="button" id="dashboard">Dashboard</button>
            <button type="button" id="inicio">Ínicio</button>
            <button type="button" id="consultoria">Consultoria</button>
            <button type="button" id="planos">Planos</button>
        </div>

        <div id="caixa3">
            <button type="button" id="usuario">
                <img src="Botao usuario.png" alt="Botão de usuário" id="fotousuario">
            </button>
        </div>

        <div id="caixa4">
            <button type="button" id="sair">
                <img src="Botão sair.png" alt="Botão sair" style="width: 50px; height: 60px;">
            </button>
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="linha-caixas">

            <div id="caixa5">
                <h1 id="tit">Planos de treino</h1>
                <h1 id="subtit">Recentes</h1>
                <button type="button" id="TrA">Treino A</button>
                <button type="button" id="TrB">Treino B</button>
                <button type="button" id="TrC">Treino C</button>
            </div>

            <div id="caixa6">
                <h1 id="tit">Consultoria</h1>
                <button type="button" id="TrA">Iniciar nova consultoria</button>
                <button type="button" id="TrB">Consultas em aberto</button>
                <button type="button" id="TrC">Histórico de consultas</button>
            </div>

        </div>

        <div id="caixa7">
            <img src="graficos.png" alt="gráficos de avaliação" id="grafico">
        </div>
    </div>
</body>
</html>
