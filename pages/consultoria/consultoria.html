<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria - Hit-boxe</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="consultoria.css">

</head>
<body>
    <div class="home home--logged">
        <img id="logo" src="../../assets/img/logos/logo-hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='../faq/faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="dashboard" onclick="window.location.href='../dashboard/dashboard.html'">Dashboard</button>
            <button type="button" id="inicio" onclick="window.location.href='../../index.html'">Ínicio</button>
            <button type="button" id="consultoria" class="ativo">Consultoria</button>
            <button type="button" id="planos" onclick="window.location.href='../plano-treinos/plano-treinos.html'">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="usuario" onclick="window.location.href='../dashboard/dashboard.html'">
                <img src="../../assets/img/Botao usuario.png" alt="Usuário" id="fotousuario">
            </button>
        </div>
        <div id="caixa4">
            <button type="button" id="sair" onclick="sair()">
                <img src="../../assets/img/botao-sair.png" alt="Sair" class="icon-button-img">
            </button>
        </div>
    </div>

    <div class="content-offset">
        <h1 id="tit">Consultoria</h1>

        <div class="conteudo-principal">
            <div id="caixa5">
                <img src="../../assets/img/foto consultor.png" alt="foto consultor" id="ftconsultor">
                <h1 id="tit1">Consultor: Gustavo Alves</h1>
                <textarea id="textbox" placeholder="Solicitar um treino ou tirar uma dúvida..."></textarea>
                <button type="button" id="nvconsult" onclick="enviarConsultoria()">Nova Consultoria</button>
                <div id="msg-consult" class="form-feedback consult-message"></div>
            </div>

            <div id="caixa6">
                <h1 id="subtit"><b id="subtitbld">Consultas em aberto</b></h1>
                <hr>
                <div id="lista-consultas"></div>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(sessionStorage.getItem("usuarioLogado"));
        if (!usuario) window.location.href = "../login/login.html";

        function sair() {
            sessionStorage.removeItem("usuarioLogado");
            window.location.href = "../login/login.html";
        }

        const consultas = JSON.parse(sessionStorage.getItem("consultas") || "[]");
        function renderConsultas() {
            const div = document.getElementById("lista-consultas");
            if (consultas.length === 0) {
                div.innerHTML = '<p class="empty-state">Nenhuma consulta em aberto.</p>';
                return;
            }
            div.innerHTML = consultas.map((c, i) => `
                <div class="consulta-card">
                    <p class="consulta-texto">${c.texto}</p>
                    <p class="consulta-data">${c.data}</p>
                </div>`).join("");
        }
        renderConsultas();

        function enviarConsultoria() {
            const texto = document.getElementById("textbox").value.trim();
            const msg = document.getElementById("msg-consult");
            if (!texto) {
                msg.style.color = "red";
                msg.textContent = "⚠ Digite sua mensagem antes de enviar.";
                msg.style.display = "block";
                return;
            }
            const agora = new Date();
            consultas.push({ texto, data: agora.toLocaleString("pt-BR") });
            sessionStorage.setItem("consultas", JSON.stringify(consultas));
            document.getElementById("textbox").value = "";
            msg.style.color = "green";
            msg.textContent = "✓ Consultoria enviada! Aguarde o retorno do consultor.";
            msg.style.display = "block";
            renderConsultas();
            setTimeout(() => { msg.style.display = "none"; }, 3000);
        }
    </script>
</body>
</html>
