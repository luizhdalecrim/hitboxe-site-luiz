<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Treinos - Hit-boxe</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="plano-treinos.css">

</head>
<body>
    <div class="home home--logged">
        <img id="logo" src="../../assets/img/logos/logo-hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='../faq/faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="dashboard" onclick="window.location.href='../dashboard/dashboard.html'">Dashboard</button>
            <button type="button" id="inicio" onclick="window.location.href='../../index.html'">Ínicio</button>
            <button type="button" id="consultoria" onclick="window.location.href='../consultoria/consultoria.html'">Consultoria</button>
            <button type="button" id="planos" class="ativo">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="usuario" onclick="window.location.href='../dashboard/dashboard.html'">
                <img src="../../assets/img/Botao usuario.png" alt="Usuário" id="fotousuario">
            </button>
        </div>
        <div id="caixa4">
            <button type="button" id="sair" onclick="sair()">
                <img src="../../assets/img/botao-sair.png" alt="Sair" class="icon-button-img">
            </button>
        </div>
    </div>

    <h1 id="tit">Planos de Treino</h1>

    <div class="plano-layout">
        <div class="nav-treinos">
            <button type="button" id="TrA" class="btn-ativo" onclick="selecionarTreino('A',this)">Treino A</button>
            <button type="button" id="TrB" onclick="selecionarTreino('B',this)">Treino B</button>
            <button type="button" id="TrC" onclick="selecionarTreino('C',this)">Treino C</button>
            <button type="button" id="TrD" onclick="selecionarTreino('D',this)">Treino D</button>
            <button type="button" id="TrE" onclick="selecionarTreino('E',this)">Treino E</button>
        </div>
        <div id="caixa5">
            <div id="detalhe-treino"></div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(sessionStorage.getItem("usuarioLogado"));
        if (!usuario) window.location.href = "../login/login.html";
        function sair() { sessionStorage.removeItem("usuarioLogado"); window.location.href = "../login/login.html"; }

        const treinos = {
            A: { treinador:"Gustavo Alves", atualizacao:"20/05/26", exercicios:[
                {nome:"Aquecimento",detalhe:"10-15 min de pular corda e movimentação articular"},
                {nome:"Shadow Boxing",detalhe:"3 rounds de 3 min com foco em técnica e footwork"},
                {nome:"Manopla / Foco",detalhe:"3 rounds — combinações 1-2, 1-2-3, gancho"},
                {nome:"Saco de Pancadas",detalhe:"3-4 rounds — força e timing"},
                {nome:"Speed Bag / Teto-Solo",detalhe:"2-3 rounds — ritmo e coordenação"},
                {nome:"Defesa e Esquiva",detalhe:"2-3 rounds de drills com parceiro"},
                {nome:"Condicionamento",detalhe:"Calistenia: flexões, abdominais, agachamentos ou HIIT 2-3 rounds"},
            ]},
            B: { treinador:"Gustavo Alves", atualizacao:"21/05/26", exercicios:[
                {nome:"Aquecimento",detalhe:"10 min de corrida leve + mobilidade"},
                {nome:"Shadow Boxing",detalhe:"2 rounds com ênfase em defesa e contragolpe"},
                {nome:"Sparring Técnico",detalhe:"3 rounds — apenas jab, straight e movimentação"},
                {nome:"Saco Pesado",detalhe:"4 rounds — potência máxima no último round"},
                {nome:"Abdominal Circuit",detalhe:"3 séries: 20 abdominais, 15 oblíquos, 10 elevação de pernas"},
            ]},
            C: { treinador:"Marcos Lima", atualizacao:"22/05/26", exercicios:[
                {nome:"Aquecimento",detalhe:"8 min de corda + alongamento dinâmico"},
                {nome:"Pads Work",detalhe:"4 rounds — combinações avançadas de 5 golpes"},
                {nome:"Clinch e Corpo a Corpo",detalhe:"2 rounds — controle e golpes no clinch"},
                {nome:"Condicionamento Aeróbico",detalhe:"4 rounds de shadowboxing em alta intensidade"},
                {nome:"Alongamento Final",detalhe:"10 min de recuperação"},
            ]},
            D: { treinador:"Gustavo Alves", atualizacao:"23/05/26", exercicios:[
                {nome:"Aquecimento",detalhe:"Corrida 15 min ritmo moderado"},
                {nome:"Plyometria",detalhe:"3 séries: 10 saltos, 10 burpees, 15 agachamentos explosivos"},
                {nome:"Shadowboxing com Peso",detalhe:"3 rounds com halteres leves 0,5kg"},
                {nome:"Core Training",detalhe:"Prancha 3x60s, Russian twist 3x20"},
            ]},
            E: { treinador:"Marcos Lima", atualizacao:"24/05/26", exercicios:[
                {nome:"Aquecimento Leve",detalhe:"5 min + mobilidade quadril e ombros"},
                {nome:"Técnica de Jab",detalhe:"100 repetições no espelho — foco na extensão total"},
                {nome:"Técnica de Gancho",detalhe:"50 repetições cada lado com manopla"},
                {nome:"Repouso Ativo",detalhe:"Caminhada + respiração controlada — dia de recuperação"},
            ]}
        };

        function selecionarTreino(letra, btn) {
            document.querySelectorAll(".nav-treinos button").forEach(b => b.classList.remove("btn-ativo"));
            btn.classList.add("btn-ativo");
            const t = treinos[letra];
            let html = `<h1 id="subtit"><b id="subtitbld">Treinador: </b> ${t.treinador} &nbsp; <b id="subtitbld1">Atualização:</b> ${t.atualizacao}</h1><hr>`;
            t.exercicios.forEach((ex,i) => {
                html += `<h1 id="subtit"><b id="subtitbld">${i+1}. ${ex.nome}</b> — ${ex.detalhe}</h1><hr>`;
            });
            document.getElementById("detalhe-treino").innerHTML = html;
        }
        selecionarTreino("A", document.getElementById("TrA"));
    </script>
</body>
</html>
