<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hit-boxe</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="../../assets/img/logos/logo-hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='../faq/faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="sobre" onclick="window.location.href='../sobre/sobre.html'">Sobre</button>
            <button type="button" id="inicio" onclick="window.location.href='../../index.html'">Início</button>
            <button type="button" id="planos" onclick="window.location.href='../planos/planos.html'">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="cadastro" onclick="window.location.href='../cadastro/cadastro.html'">Cadastro</button>
        </div>
        <div id="caixa4">
            <button type="button" id="Login" class="ativo">Login</button>
        </div>
    </div>

    <div class="login-layout main-offset">
        <div id="caixa5">
            <h1 id="tit">Login</h1>
            <h1 id="subtit">Email:</h1>
            <input type="email" class="email-input" id="email" placeholder="seuemail@gmail.com"/>
            <h1 id="subtit">Senha:</h1>
            <input type="password" id="senha" placeholder="**********"/>
            <div id="erro-msg" class="form-feedback form-feedback--error">
                ⚠ Email ou senha incorretos.
            </div>
            <button type="button" id="btlogin" onclick="fazerLogin()">Entrar</button>
            <button type="button" id="cadastro1" onclick="window.location.href='../cadastro/cadastro.html'">Cadastrar-se</button>
            <button type="button" id="trocarsenha">Esqueceu a senha?</button>
        </div>
        <img src="../../assets/img/fotologin.png" alt="Cada Round 1 vencedor." id="fotologin">
    </div>

    <script>
        const USUARIOS = [
            { email: "pedro@hitboxe.com",  senha: "Hitboxe@123", nome: "Pedro Silva" },
            { email: "admin@hitboxe.com",  senha: "Admin@123",   nome: "Administrador" },
            { email: "aluno@hitboxe.com",  senha: "Aluno@123",   nome: "João Aluno" }
        ];

        function fazerLogin() {
            const emailVal = document.getElementById("email").value.trim().toLowerCase();
            const senhaVal = document.getElementById("senha").value;
            const erroEl  = document.getElementById("erro-msg");
            const usuario = USUARIOS.find(u => u.email.toLowerCase() === emailVal && u.senha === senhaVal);
            if (usuario) {
                sessionStorage.setItem("usuarioLogado", JSON.stringify(usuario));
                erroEl.style.display = "none";
                window.location.href = "../dashboard/dashboard.html";
            } else {
                erroEl.style.display = "block";
                document.getElementById("senha").value = "";
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") fazerLogin();
        });

        document.addEventListener("DOMContentLoaded", function() {
            const hint = document.createElement("p");
            hint.className = "login-hint";
            hint.innerHTML = "💡 Demo: <b>pedro@hitboxe.com</b> / <b>Hitboxe@123</b>";
            document.getElementById("caixa5").appendChild(hint);
        });
    </script>
</body>
</html>
