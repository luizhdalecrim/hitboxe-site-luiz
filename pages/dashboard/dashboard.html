<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hit-boxe</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="dashboard.css">

</head>
<body>
    <div class="home home--logged">
        <img id="logo" src="../../assets/img/logos/logo-hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='../faq/faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="dashboard" class="ativo" onclick="window.location.href='../dashboard/dashboard.html'">Dashboard</button>
            <button type="button" id="inicio" onclick="window.location.href='../../index.html'">Início</button>
            <button type="button" id="consultoria" onclick="window.location.href='../consultoria/consultoria.html'">Consultoria</button>
            <button type="button" id="planos" onclick="window.location.href='../plano-treinos/plano-treinos.html'">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="usuario" onclick="window.location.href='../dashboard/dashboard.html'">
                <img src="../../assets/img/Botao usuario.png" alt="Usuário" id="fotousuario">
            </button>
        </div>
        <div id="caixa4">
            <button type="button" id="sair" onclick="sair()">
                <img src="../../assets/img/botao-sair.png" alt="Sair" class="icon-button-img">
            </button>
        </div>
    </div>

    <div class="saudacao">
        <h1 id="saudacao-nome">Olá, Aluno!</h1>
        <p id="saudacao-sub">Bem-vindo ao seu painel de treinos</p>
    </div>

    <div class="resumo-cards">
        <div class="card-resumo">
            <span class="card-icone">🥊</span>
            <div>
                <p class="card-label">Treinos este mês</p>
                <p class="card-valor">12</p>
            </div>
        </div>
        <div class="card-resumo">
            <span class="card-icone">⏱️</span>
            <div>
                <p class="card-label">Horas treinadas</p>
                <p class="card-valor">18h</p>
            </div>
        </div>
        <div class="card-resumo">
            <span class="card-icone">📈</span>
            <div>
                <p class="card-label">Evolução geral</p>
                <p class="card-valor">+14%</p>
            </div>
        </div>
        <div class="card-resumo">
            <span class="card-icone">💬</span>
            <div>
                <p class="card-label">Consultas abertas</p>
                <p class="card-valor">2</p>
            </div>
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="linha-caixas">
            <div id="caixa5">
                <h1 id="tit">Planos de treino</h1>
                <h1 id="subtit">Recentes</h1>
                <button type="button" id="TrA" onclick="window.location.href='../plano-a/plano-a.html'">Treino A</button>
                <button type="button" id="TrB" onclick="window.location.href='../plano-treinos/plano-treinos.html'">Treino B</button>
                <button type="button" id="TrC" onclick="window.location.href='../plano-treinos/plano-treinos.html'">Treino C</button>
            </div>
            <div id="caixa6">
                <h1 id="tit">Consultoria</h1>
                <button type="button" id="TrA" onclick="window.location.href='../consultoria/consultoria.html'">Iniciar nova consultoria</button>
                <button type="button" id="TrB" onclick="window.location.href='../consultoria/consultoria.html'">Consultas em aberto</button>
                <button type="button" id="TrC" onclick="window.location.href='../consultoria/consultoria.html'">Histórico de consultas</button>
            </div>
        </div>

        <div id="caixa7">
            <div class="grafico-wrapper">
                <h2 class="grafico-titulo">Evolução de Desempenho — Últimas 6 Semanas</h2>
                <canvas id="graficoEvolucao" width="900" height="280"></canvas>
            </div>
        </div>

        <div id="caixa8">
            <h1 id="tit">Histórico de Treinos</h1>
            <table class="tabela-historico">
                <thead>
                    <tr>
                        <th>Data</th><th>Treino</th><th>Treinador</th><th>Duração</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="historico-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(sessionStorage.getItem("usuarioLogado"));
        if (!usuario) {
            window.location.href = "../login/login.html";
        } else {
            document.getElementById("saudacao-nome").textContent = "Olá, " + usuario.nome + "!";
        }

        function sair() {
            sessionStorage.removeItem("usuarioLogado");
            window.location.href = "../login/login.html";
        }

        const historicoTreinos = [
            { data: "27/05/26", treino: "Treino A", treinador: "Gustavo Alves", duracao: "1h 30min", status: "Concluído" },
            { data: "25/05/26", treino: "Treino B", treinador: "Gustavo Alves", duracao: "1h 15min", status: "Concluído" },
            { data: "22/05/26", treino: "Treino A", treinador: "Gustavo Alves", duracao: "1h 45min", status: "Concluído" },
            { data: "20/05/26", treino: "Treino C", treinador: "Marcos Lima",   duracao: "2h 00min", status: "Concluído" },
            { data: "17/05/26", treino: "Treino B", treinador: "Gustavo Alves", duracao: "1h 20min", status: "Faltou" },
            { data: "15/05/26", treino: "Treino A", treinador: "Gustavo Alves", duracao: "1h 30min", status: "Concluído" },
        ];

        const tbody = document.getElementById("historico-body");
        historicoTreinos.forEach(t => {
            const statusClass = t.status === "Concluído" ? "status-cell--done" : "status-cell--missed";
            tbody.innerHTML += `<tr><td>${t.data}</td><td>${t.treino}</td><td>${t.treinador}</td><td>${t.duracao}</td><td class="status-cell ${statusClass}">${t.status}</td></tr>`;
        });

        const canvas = document.getElementById("graficoEvolucao");
        const ctx = canvas.getContext("2d");
        const semanas = ["Sem. 1","Sem. 2","Sem. 3","Sem. 4","Sem. 5","Sem. 6"];
        const forcaData = [62,65,68,70,72,76];
        const velocidadeData = [55,58,60,64,66,70];
        const resistData = [50,54,57,60,63,67];
        const W=canvas.width,H=canvas.height,padL=50,padR=30,padT=20,padB=40;
        const chartW=W-padL-padR,chartH=H-padT-padB,minVal=40,maxVal=90;
        function xPos(i){return padL+(i/(semanas.length-1))*chartW;}
        function yPos(v){return padT+chartH-((v-minVal)/(maxVal-minVal))*chartH;}
        ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
        ctx.strokeStyle="#ddd";ctx.lineWidth=1;
        for(let v=minVal;v<=maxVal;v+=10){const y=yPos(v);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+chartW,y);ctx.stroke();ctx.fillStyle="#888";ctx.font="12px Arial";ctx.fillText(v,padL-32,y+4);}
        ctx.fillStyle="#333";ctx.font="13px Arial";ctx.textAlign="center";
        semanas.forEach((s,i)=>ctx.fillText(s,xPos(i),H-padB+18));
        function desenharLinha(dados,cor){ctx.strokeStyle=cor;ctx.lineWidth=2.5;ctx.beginPath();dados.forEach((v,i)=>{if(i===0)ctx.moveTo(xPos(i),yPos(v));else ctx.lineTo(xPos(i),yPos(v));});ctx.stroke();ctx.fillStyle=cor;dados.forEach((v,i)=>{ctx.beginPath();ctx.arc(xPos(i),yPos(v),5,0,Math.PI*2);ctx.fill();});}
        desenharLinha(forcaData,"#a00000");desenharLinha(velocidadeData,"#333");desenharLinha(resistData,"#888");
        const legendas=[{label:"Força",cor:"#a00000"},{label:"Velocidade",cor:"#333"},{label:"Resistência",cor:"#888"}];
        let lx=padL;legendas.forEach(l=>{ctx.fillStyle=l.cor;ctx.fillRect(lx,padT-14,18,10);ctx.fillStyle="#333";ctx.font="12px Arial";ctx.textAlign="left";ctx.fillText(l.label,lx+22,padT-5);lx+=110;});
    </script>
</body>
</html>
