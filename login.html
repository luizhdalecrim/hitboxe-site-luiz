<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hit-boxe</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="estilo-login.css">
    <link rel="stylesheet" href="estilo-global.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="sobre" onclick="window.location.href='sobre.html'">Sobre</button>
            <button type="button" id="inicio" onclick="window.location.href='index.html'">Ínicio</button>
            <button type="button" id="planos" onclick="window.location.href='Planos.html'">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="cadastro" onclick="window.location.href='cadastro.html'">Cadastro</button>
        </div>
        <div id="caixa4">
            <button type="button" id="Login" class="ativo">Login</button>
        </div>
    </div>

    <div class="login-layout form-page-layout">
        <div id="caixa5">
            <h1 id="tit">Login</h1>
            <h1 id="subtit">Email:</h1>
            <input type="email" class="email-input" id="email" placeholder="seuemail@gmail.com"/>
            <h1 id="subtit">Senha:</h1>
            <input type="password" id="senha" placeholder="**********"/>
            <div id="erro-msg" class="auth-message auth-message--erro">
                ⚠ Email ou senha incorretos.
            </div>
            <button type="button" id="btlogin" onclick="fazerLogin()">Entrar</button>
            <button type="button" id="cadastro1" onclick="window.location.href='cadastro.html'">Cadastrar-se</button>
            <button type="button" id="trocarsenha">Esqueceu a senha?</button>
        </div>
        <img src="fotologin.png" alt="Cada Round 1 vencedor." id="fotologin">
    </div>

    <footer class="site-footer">
        <p class="site-footer__brand">Hitboxe</p>
        <p class="site-footer__text">Treinos personalizados, acompanhamento de evolução e consultoria para cada fase do seu round.</p>
        <nav class="site-footer__links" aria-label="Links do rodapé">
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="Planos.html">Planos</a>
            <a href="faq.html">FAQ</a>
        </nav>
    </footer>

    <script>
        const USUARIOS = [
            { email: "pedro@hitboxe.com",  senha: "Hitboxe@123", nome: "Pedro Silva" },
            { email: "admin@hitboxe.com",  senha: "Admin@123",   nome: "Administrador" },
            { email: "aluno@hitboxe.com",  senha: "Aluno@123",   nome: "João Aluno" }
        ];

        function fazerLogin() {
            const emailVal = document.getElementById("email").value.trim().toLowerCase();
            const senhaVal = document.getElementById("senha").value;
            const erroEl  = document.getElementById("erro-msg");
            const usuario = USUARIOS.find(u => u.email.toLowerCase() === emailVal && u.senha === senhaVal);
            if (usuario) {
                sessionStorage.setItem("usuarioLogado", JSON.stringify(usuario));
                erroEl.style.display = "none";
                window.location.href = "dashboard.html";
            } else {
                erroEl.style.display = "block";
                document.getElementById("senha").value = "";
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") fazerLogin();
        });

        document.addEventListener("DOMContentLoaded", function() {
            const hint = document.createElement("p");
            hint.style.cssText = "color:#888;font-family:Arial,sans-serif;font-size:13px;text-align:center;margin-top:8px;";
            hint.innerHTML = "💡 Demo: <b>pedro@hitboxe.com</b> / <b>Hitboxe@123</b>";
            document.getElementById("caixa5").appendChild(hint);
        });
    </script>
</body>
</html>
