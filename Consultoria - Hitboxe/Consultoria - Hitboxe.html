<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria - Hit-boxe</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">
        <img id="menu" src="botão opções.png" alt="Botão de Menu">

        <div id="caixa1">    
            <button type="button" id="faq">FAQ</button>
        </div>

        <div id="caixa2">
            <button type="button" id="dashboard">Dashboard</button>
            <button type="button" id="inicio">Ínicio</button>
            <button type="button" id="consultoria">Consultoria</button>
            <button type="button" id="planos">Planos</button>
        </div>

        <div id="caixa3">
            <button type="button" id="usuario">
                <img src="Botao usuario.png" alt="Botão de usuário" id="fotousuario">
            </button>
        </div>

        <div id="caixa4">
            <button type="button" id="sair">
                <img src="Botão sair.png" alt="Botão sair" style="width: 50px; height: 60px;">
            </button>
        </div>
    </div>

    <h1 id="tit">Consultoria</h1>

    <div class="conteudo-principal">

        <div id="caixa5"> 
            <img src="foto consultor.png" alt="foto consultor" id="ftconsultor">
            <img src="botao expandir.png" alt="botão expandir" id="btexpandir">
            <h1 id="tit1">Consultor X</h1>
            <textarea id="textbox" placeholder="Solicitar um treino..."></textarea>
            <button type="submit" id="nvconsult">Nova Consultoria</button>
        </div>

        <div id="caixa6">
            <h1 id="subtit"><b id="subtitbld">"Mudar Treino A" - Cons.: </b> Gustavo Alves || <b id="subtitbld1">20/02/26</b></h1>
            <hr>
            <h1 id="subtit"><b id="subtitbld">"Criar Treino B..." - Cons.: </b> Gustavo Alves || <b id="subtitbld1">22/02/26</b></h1>
            <hr>
            <h1 id="subtitbld2"> ... </h1>
        </div>

    </div>
</body>
</html>
