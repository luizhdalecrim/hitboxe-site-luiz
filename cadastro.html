<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Hit-boxe</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="estilo-cadastro.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="sobre" onclick="window.location.href='sobre.html'">Sobre</button>
            <button type="button" id="inicio" onclick="window.location.href='index.html'">Ínicio</button>
            <button type="button" id="planos" onclick="window.location.href='Planos.html'">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="cadastro" class="ativo">Cadastro</button>
        </div>
        <div id="caixa4">
            <button type="button" id="Login" onclick="window.location.href='login.html'">Login</button>
        </div>
    </div>

    <div class="cadastro-layout" style="padding-top:80px;">
        <div id="caixa5">
            <h1 id="tit">Cadastrar-se</h1>
            <h1 id="subtit">Email:</h1>
            <input type="email" id="email-cad" class="email-input" placeholder="seuemail@gmail.com"/>
            <h1 id="subtit">Senha:</h1>
            <input type="password" id="senha" placeholder="**********"/>
            <ul id="obrigatoriedades">
                <p id="tit2">Obrigatório:</p>
                <li>Ter 1 letra maiúscula</li>
                <li>Ter 1 letra minúscula</li>
                <li>Ter 1 número</li>
                <li>Ter 1 caractere especial</li>
                <li>Ter no mínimo 8 caracteres</li>
            </ul>
            <h1 id="subtit2">Confirmar senha:</h1>
            <input type="password" id="senha1" placeholder="**********"/>
            <div id="msg-cadastro" style="font-family:Arial,sans-serif;font-size:14px;display:none;"></div>
            <button type="button" id="btcadastro" onclick="validarCadastro()">Cadastrar-se</button>
            <div class="checkbox-row">
                <input type="checkbox" id="checkbox"/>
                <p id="txtChbx">Modalidade apenas online</p>
            </div>
            <p style="text-align:center;font-size:14px;color:#555;">Já tem conta? <a href="login.html" style="color:rgb(104,0,0);">Entrar</a></p>
        </div>
        <img src="fotocadastro.png" alt="Onde os campeões são forjados" id="fotocadastro">
    </div>

    <script>
        function validarCadastro() {
            const senha = document.getElementById("senha").value;
            const senha1 = document.getElementById("senha1").value;
            const msg = document.getElementById("msg-cadastro");
            const regras = [
                { regex: /[A-Z]/, texto: "Deve ter ao menos 1 letra maiúscula" },
                { regex: /[a-z]/, texto: "Deve ter ao menos 1 letra minúscula" },
                { regex: /[0-9]/, texto: "Deve ter ao menos 1 número" },
                { regex: /[^A-Za-z0-9]/, texto: "Deve ter ao menos 1 caractere especial" },
                { regex: /.{8,}/, texto: "Deve ter no mínimo 8 caracteres" }
            ];
            for (const r of regras) {
                if (!r.regex.test(senha)) {
                    msg.style.color = "rgb(207,0,0)";
                    msg.textContent = "⚠ " + r.texto;
                    msg.style.display = "block";
                    return;
                }
            }
            if (senha !== senha1) {
                msg.style.color = "rgb(207,0,0)";
                msg.textContent = "⚠ As senhas não coincidem.";
                msg.style.display = "block";
                return;
            }
            msg.style.color = "green";
            msg.textContent = "✓ Cadastro realizado! Redirecionando para o login...";
            msg.style.display = "block";
            setTimeout(() => window.location.href = "login.html", 1800);
        }
    </script>
</body>
</html>
