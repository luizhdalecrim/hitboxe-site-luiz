<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro cliente - Hit-boxe</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">

        <div id="caixa1">    
            <button type="button" id="faq">FAQ</button>
        </div>

        <div id="caixa2">
            <button type="button" id="sobre">Sobre</button>
            <button type="button" id="inicio">Ínicio</button>
            <button type="button" id="planos">Planos</button>
        </div>

        <div id="caixa3">
            <button type="button" id="cadastro">Cadastro</button>
        </div>

        <div id="caixa4">
            <button type="button" id="Login">Login</button>
        </div>
    </div>

    <div class="cadastro-layout">
        <div id="caixa5">
            <h1 id="tit">Cadastrar-se</h1>

            <h1 id="subtit">Senha:</h1>
            <input type="password" id="senha" size="30" placeholder="**********"/>

            <ul id="obrigatoriedades">
                <p id="tit2">Obrigatório:</p>
                <li>Ter 1 letra maiúscula</li>
                <li>Ter 1 letra minúscula</li>
                <li>Ter 1 número</li>
                <li>Ter 1 caractere alfanumérico</li>
                <li>Ter no mínimo 8 caracteres</li>
            </ul>

            <h1 id="subtit2">Confirmar senha:</h1>
            <input type="password" id="senha1" size="30" placeholder="**********"/>

            <button type="submit" id="btcadastro">Cadastrar-se</button>

            <div class="checkbox-row">
                <input type="checkbox" value="true" id="checkbox"/>
                <p id="txtChbx">Modalidade apenas online</p>
            </div>
        </div>

        <img src="fotocadastro.png" alt="Onde os campeões são forjados um Round por vez." id="fotocadastro">
    </div>
</body>
</html>
