<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria - Hit-boxe</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="estilo-consultoria.css">
    <style>
        #caixa3 { background-color: #ab2225 !important; }
        #caixa4 { background-color: black !important; }
    </style>
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">
        <div id="caixa1">
            <button type="button" id="faq" onclick="window.location.href='faq.html'">FAQ</button>
        </div>
        <div id="caixa2">
            <button type="button" id="dashboard" onclick="window.location.href='dashboard.html'">Dashboard</button>
            <button type="button" id="inicio" onclick="window.location.href='index.html'">Ínicio</button>
            <button type="button" id="consultoria" class="ativo">Consultoria</button>
            <button type="button" id="planos" onclick="window.location.href='plano-treinos.html'">Planos</button>
        </div>
        <div id="caixa3">
            <button type="button" id="usuario" onclick="window.location.href='dashboard.html'">
                <img src="Botao usuario.png" alt="Usuário" id="fotousuario">
            </button>
        </div>
        <div id="caixa4">
            <button type="button" id="sair" onclick="sair()">
                <img src="botao-sair.png" alt="Sair" style="width:44px;height:44px;">
            </button>
        </div>
    </div>

    <div style="padding-top:64px;">
        <h1 id="tit">Consultoria</h1>

        <div class="conteudo-principal">
            <div id="caixa5">
                <img src="foto consultor.png" alt="foto consultor" id="ftconsultor">
                <h1 id="tit1">Consultor: Gustavo Alves</h1>
                <textarea id="textbox" placeholder="Solicitar um treino ou tirar uma dúvida..."></textarea>
                <button type="button" id="nvconsult" onclick="enviarConsultoria()">Nova Consultoria</button>
                <div id="msg-consult" style="display:none;font-family:Arial,sans-serif;font-size:14px;color:green;margin-top:8px;"></div>
            </div>

            <div id="caixa6">
                <h1 id="subtit"><b id="subtitbld">Consultas em aberto</b></h1>
                <hr>
                <div id="lista-consultas"></div>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(sessionStorage.getItem("usuarioLogado"));
        if (!usuario) window.location.href = "login.html";

        function sair() {
            sessionStorage.removeItem("usuarioLogado");
            window.location.href = "login.html";
        }

        const consultas = JSON.parse(sessionStorage.getItem("consultas") || "[]");
        function renderConsultas() {
            const div = document.getElementById("lista-consultas");
            if (consultas.length === 0) {
                div.innerHTML = '<p style="color:#888;font-family:Arial,sans-serif;font-size:15px;">Nenhuma consulta em aberto.</p>';
                return;
            }
            div.innerHTML = consultas.map((c, i) => `
                <div style="background:#f9f9f9;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px;">
                    <p style="font-family:Arial,sans-serif;font-size:14px;color:#333;margin:0;">${c.texto}</p>
                    <p style="font-family:Arial,sans-serif;font-size:12px;color:#888;margin:4px 0 0 0;">${c.data}</p>
                </div>`).join("");
        }
        renderConsultas();

        function enviarConsultoria() {
            const texto = document.getElementById("textbox").value.trim();
            const msg = document.getElementById("msg-consult");
            if (!texto) {
                msg.style.color = "red";
                msg.textContent = "⚠ Digite sua mensagem antes de enviar.";
                msg.style.display = "block";
                return;
            }
            const agora = new Date();
            consultas.push({ texto, data: agora.toLocaleString("pt-BR") });
            sessionStorage.setItem("consultas", JSON.stringify(consultas));
            document.getElementById("textbox").value = "";
            msg.style.color = "green";
            msg.textContent = "✓ Consultoria enviada! Aguarde o retorno do consultor.";
            msg.style.display = "block";
            renderConsultas();
            setTimeout(() => { msg.style.display = "none"; }, 3000);
        }
    </script>
</body>
</html>
