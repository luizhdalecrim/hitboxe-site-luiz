<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hit-boxe</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="home">
        <img id="logo" src="logo.Hitboxe.png" alt="logo Hitboxe">

        <div id="caixa1">    
            <button type="button" id="faq">FAQ</button>
        </div>

        <div id="caixa2">
            <button type="button" id="sobre">Sobre</button>
            <button type="button" id="inicio">Ínicio</button>
            <button type="button" id="planos">Planos</button>
        </div>

        <div id="caixa3">
            <button type="button" id="cadastro">Cadastro</button>
        </div>

        <div id="caixa4">
            <button type="button" id="Login">Login</button>
        </div>
    </div>

    <div class="login-layout">
        <div id="caixa5">
            <h1 id="tit">Login</h1>
            <h1 id="subtit">Email:</h1>
            <input type="email" class="email-input" size="30" placeholder="seuemail@gmail.com"/>
            <h1 id="subtit">Senha:</h1>
            <input type="password" id="senha" size="30" placeholder="**********"/>
            <button type="submit" id="btlogin">Entrar</button>
            <button type="button" id="cadastro1">Cadastrar-se</button>
            <button type="button" id="trocarsenha">Esqueceu a senha?</button>
        </div>

        <img src="fotologin.png" alt="Cada Round 1 vencedor. Cada nocaute 1 campeão" id="fotologin">
    </div>
</body>
</html>
